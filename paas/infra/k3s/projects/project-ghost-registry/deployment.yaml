apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost-registry
  namespace: project-ghost-registry
  labels:
    app: ghost-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ghost-registry
  template:
    metadata:
      labels:
        app: ghost-registry
    spec:
      serviceAccountName: ghost-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ghost-registry
          image: ghcr.io/atlasia/ghost-registry:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: ghost-registry-config
            - secretRef:
                name: ghost-registry-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /data
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: ghost-registry-data
