version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    container_name: ghost-registry-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ghost-network
    depends_on:
      - marketplace-api

  marketplace-api:
    build:
      context: ../core/marketplace-backend
      dockerfile: ../../deployments/Dockerfile
    container_name: ghost-marketplace-api
    restart: unless-stopped
    environment:
      - NODE_ENV=staging
      - PORT=3000
      - DB_PATH=/data/marketplace.db
      - UPLOAD_DIR=/data/uploads
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-ghost-extensions}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_USE_SSL=${S3_USE_SSL:-true}
    volumes:
      - marketplace_data:/data
    networks:
      - ghost-network
    depends_on:
      - minio
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  minio:
    image: minio/minio:latest
    container_name: ghost-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ghost-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: ghost-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc config host add myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/${S3_BUCKET:-ghost-extensions} --ignore-existing;
      /usr/bin/mc anonymous set download myminio/${S3_BUCKET:-ghost-extensions};
      exit 0;
      "
    networks:
      - ghost-network

networks:
  ghost-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  marketplace_data:
  minio_data:
