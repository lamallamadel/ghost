apiVersion: v1
kind: Namespace
metadata:
  name: ghost-registry

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: marketplace-config
  namespace: ghost-registry
data:
  NODE_ENV: "production"
  PORT: "3000"
  DB_PATH: "/data/marketplace.db"
  UPLOAD_DIR: "/data/uploads"
  S3_BUCKET: "ghost-extensions"
  S3_REGION: "us-east-1"
  S3_USE_SSL: "true"

---
apiVersion: v1
kind: Secret
metadata:
  name: marketplace-secrets
  namespace: ghost-registry
type: Opaque
stringData:
  S3_ENDPOINT: "s3.amazonaws.com"
  S3_ACCESS_KEY: "REPLACE_WITH_AWS_ACCESS_KEY"
  S3_SECRET_KEY: "REPLACE_WITH_AWS_SECRET_KEY"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: marketplace-data-pvc
  namespace: ghost-registry
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketplace-api
  namespace: ghost-registry
  labels:
    app: marketplace-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: marketplace-api
  template:
    metadata:
      labels:
        app: marketplace-api
    spec:
      containers:
      - name: marketplace-api
        image: ghcr.io/YOUR_ORG/ghost-marketplace:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: marketplace-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: marketplace-config
              key: PORT
        - name: DB_PATH
          valueFrom:
            configMapKeyRef:
              name: marketplace-config
              key: DB_PATH
        - name: UPLOAD_DIR
          valueFrom:
            configMapKeyRef:
              name: marketplace-config
              key: UPLOAD_DIR
        - name: S3_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: marketplace-secrets
              key: S3_ENDPOINT
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: marketplace-secrets
              key: S3_ACCESS_KEY
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: marketplace-secrets
              key: S3_SECRET_KEY
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: marketplace-config
              key: S3_BUCKET
        - name: S3_REGION
          valueFrom:
            configMapKeyRef:
              name: marketplace-config
              key: S3_REGION
        - name: S3_USE_SSL
          valueFrom:
            configMapKeyRef:
              name: marketplace-config
              key: S3_USE_SSL
        volumeMounts:
        - name: marketplace-data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: marketplace-data
        persistentVolumeClaim:
          claimName: marketplace-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: marketplace-api-service
  namespace: ghost-registry
  labels:
    app: marketplace-api
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: marketplace-api

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: marketplace-ingress
  namespace: ghost-registry
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - registry.ghost.dev
    secretName: marketplace-tls
  rules:
  - host: registry.ghost.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: marketplace-api-service
            port:
              number: 3000

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: ghost-registry
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@ghost.dev
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: marketplace-api-hpa
  namespace: ghost-registry
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: marketplace-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
