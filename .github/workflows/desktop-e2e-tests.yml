name: Desktop E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop-e2e-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'desktop/**'

jobs:
  test-e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            desktop/package-lock.json

      - name: Install dependencies (root)
        run: npm install

      - name: Install dependencies (desktop)
        working-directory: desktop
        run: npm install

      - name: Install Playwright browsers
        working-directory: desktop
        run: npx playwright install --with-deps

      - name: Build desktop app
        working-directory: desktop
        run: npm run build

      - name: Run E2E tests
        working-directory: desktop
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: desktop/playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-${{ matrix.os }}
          path: desktop/test-results/
          retention-days: 7

      - name: Upload performance benchmarks
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: performance-benchmarks-${{ matrix.os }}
          path: desktop/playwright-report/results.json
          retention-days: 30
